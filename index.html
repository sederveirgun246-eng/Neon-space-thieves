<body>

<div id="wrapper">
  <div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="overlay">
      <div id="oTitle">GAME OVER!</div>
      <div id="oWinner"></div>
      <div id="oScores"></div>
      <button id="replayBtn">&#9654; PLAY AGAIN</button>
    </div>
  </div>
  <div id="hint">P1: WASD &nbsp;|&nbsp; P2: ARROW KEYS &nbsp;|&nbsp; First to 15 coins wins</div>
</div>

<script>
(function () {
  "use strict";

  /* ── CONSTANTS ─────────────────────────────────── */
  var CW = 800, CH = 600;
  var AX = 40, AY = 80, AW = 720, AH = 480;
  var SHIP_R   = 18;
  var COIN_R   = 12;
  var MET_R    = 22;
  var WIN      = 15;
  var FREEZE   = 2000;
  var ACCEL    = 0.55;
  var FRIC     = 0.88;
  var MAXSPD   = 4.5;
  var C1       = "#00ffff";
  var C2       = "#ff44aa";

  /* ── DOM ───────────────────────────────────────── */
  var canvas   = document.getElementById("gameCanvas");
  var ctx      = canvas.getContext("2d");
  var overlay  = document.getElementById("overlay");
  var oTitle   = document.getElementById("oTitle");
  var oWinner  = document.getElementById("oWinner");
  var oScores  = document.getElementById("oScores");
  var replayBtn= document.getElementById("replayBtn");

  /* ── STATIC BACKGROUND ─────────────────────────── */
  var STARS = [], NEBULAS = [], i;
  for (i = 0; i < 120; i++) {
    STARS.push({
      x: Math.random() * CW, y: Math.random() * CH,
      r: Math.random() * 1.4 + 0.3,
      phase: Math.random() * Math.PI * 2,
      spd: Math.random() * 0.02 + 0.008
    });
  }
  for (i = 0; i < 6; i++) {
    NEBULAS.push({
      x: Math.random() * CW, y: Math.random() * CH,
      r: 100 + Math.random() * 130,
      hue: Math.random() > 0.5 ? 270 : 220,
      a: 0.04 + Math.random() * 0.05
    });
  }

  /* ── INPUT ──────────────────────────────────────── */
  var keys = {};
  window.addEventListener("keydown", function (e) {
    keys[e.code] = true;
    if (e.code === "ArrowUp" || e.code === "ArrowDown" ||
        e.code === "ArrowLeft" || e.code === "ArrowRight") {
      e.preventDefault();
    }
  });
  window.addEventListener("keyup", function (e) { keys[e.code] = false; });

  /* ── HELPERS ────────────────────────────────────── */
  function rnd(lo, hi) { return lo + Math.random() * (hi - lo); }
  function randArena(margin) {
    margin = margin || 40;
    return {
      x: AX + margin + Math.random() * (AW - margin * 2),
      y: AY + margin + Math.random() * (AH - margin * 2)
    };
  }
  function hit(ax, ay, ar, bx, by, br) {
    var dx = ax - bx, dy = ay - by;
    return dx * dx + dy * dy < (ar + br) * (ar + br);
  }
  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

  /* ── GAME STATE ─────────────────────────────────── */
  var p1, p2, coin, meteors, running, cSpin, cPulse, rafId;

  function mkPlayer(x, y, ang) {
    return { x:x, y:y, vx:0, vy:0, angle:ang, score:0, frozen:false, frozenUntil:0 };
  }

  function mkMeteors() {
    var arr = [];
    for (var j = 0; j < 4; j++) {
      var pos = randArena(60);
      var ang = (Math.PI * 2 * j / 4) + Math.random() * 0.5;
      arr.push({
        x: pos.x, y: pos.y,
        vx: Math.cos(ang) * 1.8, vy: Math.sin(ang) * 1.8,
        rot: Math.random() * Math.PI * 2,
        rotSpd: (Math.random() - 0.5) * 0.04
      });
    }
    return arr;
  }

  function initGame() {
    p1      = mkPlayer(AX + 120,        AY + AH / 2, 0);
    p2      = mkPlayer(AX + AW - 120,   AY + AH / 2, Math.PI);
    coin    = randArena();
    meteors = mkMeteors();
    cSpin   = 0;
    cPulse  = 0;
    running = true;
    overlay.classList.remove("show");
  }

  /* ── UPDATE ─────────────────────────────────────── */
  function moveP(p, uk, dk, lk, rk) {
    if (p.frozen) {
      if (Date.now() > p.frozenUntil) p.frozen = false;
      return;
    }
    if (keys[uk]) p.vy -= ACCEL;
    if (keys[dk]) p.vy += ACCEL;
    if (keys[lk]) p.vx -= ACCEL;
    if (keys[rk]) p.vx += ACCEL;
    p.vx *= FRIC; p.vy *= FRIC;
    var spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    if (spd > MAXSPD) { p.vx = p.vx / spd * MAXSPD; p.vy = p.vy / spd * MAXSPD; }
    if (spd > 0.1) p.angle = Math.atan2(p.vy, p.vx);
    p.x += p.vx; p.y += p.vy;
    p.x = clamp(p.x, AX + SHIP_R, AX + AW - SHIP_R);
    p.y = clamp(p.y, AY + SHIP_R, AY + AH - SHIP_R);
  }

  function update() {
    if (!running) return;
    cSpin  += 0.06;
    cPulse += 0.08;

    for (var j = 0; j < meteors.length; j++) {
      var m = meteors[j];
      m.x += m.vx; m.y += m.vy; m.rot += m.rotSpd;
      if (m.x - MET_R < AX)        { m.x = AX + MET_R;        m.vx *= -1; }
      if (m.x + MET_R > AX + AW)   { m.x = AX + AW - MET_R;   m.vx *= -1; }
      if (m.y - MET_R < AY)        { m.y = AY + MET_R;        m.vy *= -1; }
      if (m.y + MET_R > AY + AH)   { m.y = AY + AH - MET_R;   m.vy *= -1; }
    }

    moveP(p1, "KeyW",    "KeyS",     "KeyA",     "KeyD");
    moveP(p2, "ArrowUp", "ArrowDown","ArrowLeft", "ArrowRight");

    // coin pickup
    var players = [p1, p2];
    for (var pi = 0; pi < 2; pi++) {
      var p = players[pi];
      if (!p.frozen && hit(p.x, p.y, SHIP_R - 4, coin.x, coin.y, COIN_R)) {
        p.score++;
        coin = randArena();
        if (p.score >= WIN) { endGame(pi + 1); return; }
      }
    }

    // meteor freeze
    for (var pi2 = 0; pi2 < 2; pi2++) {
      var pp = players[pi2];
      if (pp.frozen) continue;
      for (var j2 = 0; j2 < meteors.length; j2++) {
        var mm = meteors[j2];
        if (hit(pp.x, pp.y, SHIP_R - 6, mm.x, mm.y, MET_R - 4)) {
          pp.frozen = true;
          pp.frozenUntil = Date.now() + FREEZE;
          pp.vx = 0; pp.vy = 0;
          break;
        }
      }
    }
  }

  function endGame(num) {
    running = false;
    var col = num === 1 ? C1 : C2;
    oTitle.style.color      = col;
    oTitle.style.textShadow = "0 0 30px " + col + ", 0 0 60px " + col;
    oWinner.textContent     = "PLAYER " + num + " WINS!";
    oScores.textContent     = "P1: " + p1.score + "  \u2014  P2: " + p2.score;
    overlay.classList.add("show");
  }

  /* ── DRAW: BACKGROUND ───────────────────────────── */
  function drawBG(t) {
    ctx.fillStyle = "#050510";
    ctx.fillRect(0, 0, CW, CH);

    for (var j = 0; j < NEBULAS.length; j++) {
      var n = NEBULAS[j];
      var g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
      g.addColorStop(0, "hsla(" + n.hue + ",80%,50%," + (n.a * 2).toFixed(3) + ")");
      g.addColorStop(1, "hsla(" + n.hue + ",80%,30%,0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fill();
    }

    for (var k = 0; k < STARS.length; k++) {
      var s = STARS[k];
      var alpha = 0.4 + 0.6 * Math.abs(Math.sin(s.phase + t * s.spd));
      ctx.fillStyle = "rgba(255,255,255," + alpha.toFixed(3) + ")";
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  /* ── DRAW: ARENA ────────────────────────────────── */
  function drawArena() {
    ctx.save();
    ctx.shadowColor = "#cc00ff"; ctx.shadowBlur = 22;
    ctx.strokeStyle = "#cc00ff"; ctx.lineWidth  = 3;
    ctx.strokeRect(AX, AY, AW, AH);
    ctx.shadowBlur  = 6;
    ctx.strokeStyle = "#ff66ff"; ctx.lineWidth = 1;
    ctx.strokeRect(AX + 4, AY + 4, AW - 8, AH - 8);
    ctx.restore();
  }

  /* ── DRAW: HUD ──────────────────────────────────── */
  function drawHUD() {
    ctx.fillStyle = "rgba(0,0,5,0.88)";
    ctx.fillRect(0, 0, CW, 72);
    ctx.strokeStyle = "#440066"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, 71); ctx.lineTo(CW, 71); ctx.stroke();

    ctx.save();
    ctx.shadowColor = C1; ctx.shadowBlur = 14; ctx.fillStyle = C1;
    ctx.font = "bold 22px 'Courier New',monospace";
    ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
    ctx.fillText("P1 SCORE: " + p1.score, 60, 46);
    ctx.restore();

    ctx.save();
    ctx.shadowColor = C2; ctx.shadowBlur = 14; ctx.fillStyle = C2;
    ctx.font = "bold 22px 'Courier New',monospace";
    ctx.textAlign = "right"; ctx.textBaseline = "alphabetic";
    ctx.fillText("P2 SCORE: " + p2.score, 740, 46);
    ctx.restore();

    ctx.save();
    ctx.shadowColor = "#aa44ff"; ctx.shadowBlur = 8; ctx.fillStyle = "#cc88ff";
    ctx.font = "bold 13px 'Courier New',monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
    ctx.fillText("\u2605 NEON SPACE THIEVES \u2605", 400, 28);
    ctx.restore();

    ctx.save();
    ctx.fillStyle = "#664488"; ctx.shadowBlur = 0;
    ctx.font = "10px 'Courier New',monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
    ctx.fillText("P1: WASD  |  P2: ARROWS  |  First to 15 wins!", 400, 56);
    ctx.restore();
  }

  /* ── DRAW: SHIP ─────────────────────────────────── */
  function drawShip(p, color) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);

    var frozen = p.frozen;
    var c = frozen ? "#888" : color;
    ctx.shadowColor = frozen ? "#333" : color;
    ctx.shadowBlur  = frozen ? 5 : 16;

    // Body
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.moveTo( 18,  0);
    ctx.lineTo(-10, -9);
    ctx.lineTo( -5,  0);
    ctx.lineTo(-10,  9);
    ctx.closePath();
    ctx.fill();

    // Top wing
    ctx.fillStyle = frozen ? "#777" : color;
    ctx.beginPath();
    ctx.moveTo(  0, -8);
    ctx.lineTo(-10, -9);
    ctx.lineTo( -8,-17);
    ctx.lineTo(  2,-11);
    ctx.closePath();
    ctx.fill();

    // Bottom wing
    ctx.beginPath();
    ctx.moveTo(  0,  8);
    ctx.lineTo(-10,  9);
    ctx.lineTo( -8, 17);
    ctx.lineTo(  2, 11);
    ctx.closePath();
    ctx.fill();

    // Cockpit
    ctx.fillStyle = frozen ? "#444" : (color === C1 ? "#003344" : "#330011");
    ctx.fillRect(3, -3, 9, 6);

    // Glint
    ctx.fillStyle = frozen ? "#555" : (color === C1 ? "#88ffff" : "#ffaacc");
    ctx.fillRect(5, -2, 4, 2);

    // Freeze rings
    if (frozen) {
      ctx.lineWidth = 1;
      for (var fi = 0; fi < 3; fi++) {
        ctx.strokeStyle = "rgba(140,190,255," + (0.4 - fi * 0.1).toFixed(2) + ")";
        ctx.globalAlpha = 0.35 - fi * 0.08;
        ctx.beginPath();
        ctx.arc(0, 0, 15 + fi * 7, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  /* ── DRAW: COIN ─────────────────────────────────── */
  function drawCoin() {
    ctx.save();
    ctx.translate(coin.x, coin.y);

    // Halo
    var halo = ctx.createRadialGradient(0, 0, 0, 0, 0, COIN_R * 2.5);
    halo.addColorStop(0, "rgba(255,220,0,0.35)");
    halo.addColorStop(1, "rgba(255,160,0,0)");
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(0, 0, COIN_R * 2.5, 0, Math.PI * 2); ctx.fill();

    // Spin squish
    ctx.scale(Math.abs(Math.cos(cSpin)) * 0.9 + 0.1, 1);

    ctx.shadowColor = "#ffdd00";
    ctx.shadowBlur  = 8 + Math.sin(cPulse) * 6;

    var lum = Math.floor(52 + Math.sin(cPulse) * 10);
    ctx.fillStyle = "hsl(45,100%," + lum + "%)";
    ctx.beginPath(); ctx.arc(0, 0, COIN_R, 0, Math.PI * 2); ctx.fill();

    ctx.strokeStyle = "#fff8a0"; ctx.lineWidth = 2; ctx.stroke();

    ctx.shadowBlur = 0; ctx.fillStyle = "#7a5500";
    ctx.font = "bold 12px 'Courier New',monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("$", 0, 1);

    ctx.restore();
  }

  /* ── DRAW: METEOR ───────────────────────────────── */
  var MOFF = [0.85, 0.95, 0.75, 1.0, 0.82, 0.92, 0.70, 0.96];

  function drawMeteor(m) {
    ctx.save();
    ctx.translate(m.x, m.y);
    ctx.rotate(m.rot);

    ctx.shadowColor = "#aa7755"; ctx.shadowBlur = 8;

    ctx.beginPath();
    for (var j = 0; j < 8; j++) {
      var a  = Math.PI * 2 * j / 8;
      var r  = MET_R * MOFF[j];
      var px = Math.cos(a) * r, py = Math.sin(a) * r;
      if (j === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();

    var g = ctx.createRadialGradient(0, 0, 2, 0, 0, MET_R);
    g.addColorStop(0,   "#c0a080");
    g.addColorStop(0.5, "#7a5a40");
    g.addColorStop(1,   "#3a2010");
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = "#c8a878"; ctx.lineWidth = 1.5; ctx.stroke();

    ctx.strokeStyle = "rgba(30,15,5,0.55)"; ctx.lineWidth = 1; ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.moveTo(-6,-4); ctx.lineTo(2, 4);
    ctx.moveTo( 4,-6); ctx.lineTo(0, 2);
    ctx.stroke();

    ctx.restore();
  }

  /* ── RENDER ─────────────────────────────────────── */
  function render(ts) {
    var t = ts / 100;
    drawBG(t);
    drawArena();
    drawHUD();
    for (var j = 0; j < meteors.length; j++) drawMeteor(meteors[j]);
    drawCoin();
    drawShip(p1, C1);
    drawShip(p2, C2);
  }

  /* ── LOOP ───────────────────────────────────────── */
  function loop(ts) {
    update();
    render(ts);
    rafId = requestAnimationFrame(loop);
  }

  function startGame() {
    if (rafId) cancelAnimationFrame(rafId);
    initGame();
    rafId = requestAnimationFrame(loop);
  }

  replayBtn.addEventListener("click", startGame);

  /* ── KICK OFF ───────────────────────────────────── */
  startGame();

}());
</script>

</body>
</html>
